    }

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {"@type":"Question","name":"Why scan local LLM configs for privacy?","acceptedAnswer":{"@type":"Answer","text":"Local LLM tools like Ollama, LM Studio, and Jan may phone home with telemetry, embed API keys in config files, or expose local paths. Scanning before sharing configs prevents accidental data leakage."}},
        {"@type":"Question","name":"What configs are supported?","acceptedAnswer":{"@type":"Answer","text":"Ollama Modelfiles (FROM, PARAMETER, SYSTEM), LM Studio JSON configs (model paths, server settings), Jan AI settings.json, and generic JSON/YAML config files."}},
        {"@type":"Question","name":"Is my data sent anywhere?","acceptedAnswer":{"@type":"Answer","text":"No. All scanning runs in your browser with zero network requests. The live network counter on the page proves it stays at 0. No cookies, no localStorage, no analytics."}},
        {"@type":"Question","name":"What risks are detected?","acceptedAnswer":{"@type":"Answer","text":"Six categories: Outbound endpoints (URLs that phone home), telemetry flags, hardcoded API keys (OpenAI, Anthropic, AWS, HuggingFace), auto-update/callback URLs, data leakage (local paths, log files), and insecure settings (CORS *, disabled SSL, 0.0.0.0 binding)."}},
        {"@type":"Question","name":"How to fix detected issues?","acceptedAnswer":{"@type":"Answer","text":"Disable telemetry flags, move API keys to environment variables, restrict CORS and host binding to localhost, and remove callback URLs you don't recognize."}}
      ]
    }
    </script>
