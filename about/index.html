    <script id="seo-data" type="application/json">{"title":"About aicalc.cloud","h1":"About aicalc.cloud","description":"Free developer tools for AI costs, security, and self-hosted software.","content":"<h2>What is aicalc.cloud?</h2><p>aicalc.cloud is a collection of <strong>25 free developer tools</strong> built by an indie developer. Every tool runs entirely in your browser — no login, no API keys, no data sent to servers.</p><h2>Why we built this</h2><p>When you're building with AI, you need quick answers: <em>How much will GPT-5.5 cost for my workload?</em> <em>Is my .env file leaking secrets?</em> <em>What's the self-hosted alternative to Slack?</em> Existing tools are either behind paywalls or buried in documentation. We make the answers instant and free.</p><h2>Our tools</h2><ul><li><strong>Cost &amp; Pricing</strong> — LLM API pricing calculator, token counter, prompt cache calculator, voice agent pricing</li><li><strong>DevOps</strong> — Cron expression generator &amp; validator, Docker deploy guides</li><li><strong>Security</strong> — .env scanner, PII redactor, CSP generator, dependency vulnerability scanner, AI agent security checker</li><li><strong>Self-Hosted</strong> — 42 SaaS alternatives, 35 tool comparisons, MCP server directory</li></ul><h2>Privacy</h2><p>All tools run client-side in your browser. We don't send your data anywhere. The only exception is the email subscription form, which sends your email to Buttondown (our newsletter provider). See our <a href=\"/privacy-policy/\">privacy policy</a> for details.</p><h2>Open source</h2><p>The source code is available on <a href=\"https://github.com/w932635477-bit/aicalc\" target=\"_blank\" rel=\"noopener noreferrer\">GitHub</a>. LLM pricing data is sourced weekly from official provider pages (OpenAI, Anthropic, Google, DeepSeek, Groq).</p><h2>Contact</h2><p>Have questions or feedback? Reach us at <a href=\"mailto:hello@aicalc.cloud\">hello@aicalc.cloud</a> or on <a href=\"https://x.com/weilei_dev\" target=\"_blank\" rel=\"noopener noreferrer\">X (Twitter)</a>.</p>","keywords":["about aicalc.cloud","free developer tools","ai pricing calculator"],"canonical":"https://aicalc.cloud/about/","ogType":"website"}</script>
