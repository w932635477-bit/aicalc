        {"@type":"Question","name":"What is a Content Security Policy (CSP)?","acceptedAnswer":{"@type":"Answer","text":"A CSP is an HTTP response header that tells browsers which sources of content are allowed to load on your page. It prevents XSS, clickjacking, and other injection attacks by restricting scripts, styles, images, and other resources."}},
        {"@type":"Question","name":"Content-Security-Policy vs Content-Security-Policy-Report-Only?","acceptedAnswer":{"@type":"Answer","text":"Content-Security-Policy enforces the policy and blocks violations. Content-Security-Policy-Report-Only logs violations to a report endpoint without blocking anything. Use Report-Only mode to test your policy before enforcement."}},
        {"@type":"Question","name":"Should I use unsafe-inline and unsafe-eval?","acceptedAnswer":{"@type":"Answer","text":"Avoid them in production. unsafe-inline allows inline scripts and event handlers, defeating XSS protection. unsafe-eval allows eval() and similar APIs. Use nonces or hashes instead. During development, they are useful for quick testing."}},
        {"@type":"Question","name":"What does strict-dynamic do?","acceptedAnswer":{"@type":"Answer","text":"strict-dynamic allows scripts loaded by trusted scripts (via nonces or hashes) to load additional scripts. It is part of CSP Level 3 and works with nonce-based policies."}},
