name: Update LLM Pricing

on:
  schedule:
    # Run daily at 10:00 UTC (off-peak to avoid :00 congestion)
    - cron: '3 10 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest prices from OpenRouter
        run: node scripts/update-prices.cjs --write

      - name: Regenerate downstream pricing files
        run: node scripts/codegen-pricing.cjs --write

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/pricing.json src/cache-calculator/pricing.ts src/llm-pricing/seo/pricing-seo-data.ts PRICING_CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/pricing.json src/cache-calculator/pricing.ts src/llm-pricing/seo/pricing-seo-data.ts PRICING_CHANGELOG.md
          git commit -m "chore: update LLM pricing data"
          git push
