    <script id="seo-data" type="application/json">{"title":"Privacy Policy","h1":"Privacy Policy","description":"How aicalc.cloud handles your data. Short version: all tools run in your browser, we collect almost nothing.","content":"<p><em>Last updated: June 8, 2026</em></p><h2>TL;DR</h2><p>All 25 tools on aicalc.cloud run entirely in your browser. We do not see, store, or transmit your prompts, code, .env files, or any other data you enter into our tools.</p><h2>Data We Collect</h2><h3>Email address (optional)</h3><p>If you subscribe to our newsletter via the email form on the site, your email address is sent to <strong>Buttondown</strong> (our newsletter provider). We use it only to send weekly updates about new tools. You can unsubscribe at any time via the link in every email.</p><h3>Google Search Console data</h3><p>We use Google Search Console to monitor how our pages appear in Google search results. This provides aggregate data (search queries, click counts, indexing status) but does not track individual users.</p><h2>Data We Do NOT Collect</h2><ul><li>No cookies (except what Vercel's CDN sets for caching)</li><li>No analytics tracking (no Google Analytics, no Mixpanel, no Hotjar)</li><li>No user accounts or login</li><li>No prompts, code, or files you enter into tools</li><li>No IP address logging beyond standard Vercel CDN logs</li></ul><h2>Third-Party Services</h2><ul><li><strong>Vercel</strong> — hosts our site. See <a href=\"https://vercel.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Vercel's privacy policy</a>.</li><li><strong>Buttondown</strong> — newsletter provider. See <a href=\"https://buttondown.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Buttondown's privacy policy</a>.</li><li><strong>Google Fonts</strong> — web fonts. Fonts are loaded from Google's CDN. See <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Google's privacy policy</a>.</li><li><strong>OSV API</strong> — used by Dep Shield to check npm package vulnerabilities. Package names are sent to OSV; your code is not.</li></ul><h2>Your Rights</h2><p>You can request deletion of your email from our newsletter at any time by unsubscribing or contacting <a href=\"mailto:hello@aicalc.cloud\">hello@aicalc.cloud</a>.</p><h2>Changes</h2><p>We may update this policy. Changes will be posted here with an updated date.</p><h2>Contact</h2><p>Questions about privacy? Email <a href=\"mailto:hello@aicalc.cloud\">hello@aicalc.cloud</a>.</p>","keywords":["privacy policy","aicalc.cloud","data collection"],"canonical":"https://aicalc.cloud/privacy-policy/","ogType":"website"}</script>
