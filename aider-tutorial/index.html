    <script type="application/json" id="seo-data">{"title":"Aider AI Coding Tutorial — 5-Minute Getting Started Guide (2026)","h1":"Aider AI Coding Tutorial: Get Started in 5 Minutes","description":"Get started with Aider, the open-source AI pair programming tool. This tutorial covers installation, API key setup, basic usage, multi-file editing, and how Aider compares with Claude Code and Cursor.","content":"<p style=\"font-size:1.1rem;color:#86868b;margin-bottom:1.5rem\">Aider is an open-source AI pair programming tool that works directly in your terminal. Unlike IDE-based tools, Aider integrates with your existing Git workflow and can edit multiple files in a single session. It supports Claude, GPT, and Gemini models.</p>\n\n<h2>Quick Install</h2>\n<div style=\"background:#1d1d1f;color:#30d158;border-radius:12px;padding:1rem 1.25rem;font-family:JetBrains Mono,monospace;font-size:0.9rem;margin:1rem 0;overflow-x:auto\"><pre style=\"margin:0;white-space:pre-wrap\"># macOS\nbrew install aider\n\n# Linux / Windows (WSL)\npip install aider-chat\n\n# Or with pipx (recommended for isolation)\npipx install aider-chat</pre></div>\n\n<h2>Set Up Your API Key</h2>\n<p>Aider works with multiple LLM providers. For the best experience, use Claude (recommended for coding):</p>\n<div style=\"background:#1d1d1f;color:#30d158;border-radius:12px;padding:1rem 1.25rem;font-family:JetBrains Mono,monospace;font-size:0.9rem;margin:1rem 0;overflow-x:auto\"><pre style=\"margin:0;white-space:pre-wrap\"># Get a key from https://console.anthropic.com\nexport ANTHROPIC_API_KEY=sk-ant-xxx\n\n# Or use OpenAI\nexport OPENAI_API_KEY=sk-xxx\n\n# Or Google Gemini\nexport GEMINI_API_KEY=xxx\n\n# Or use OpenRouter for multi-provider access\nexport OPENROUTER_API_KEY=sk-or-v1-xxx</pre></div>\n\n<h2>Your First Aider Session</h2>\n<div style=\"background:#1d1d1f;color:#30d158;border-radius:12px;padding:1rem 1.25rem;font-family:JetBrains Mono,monospace;font-size:0.9rem;margin:1rem 0;overflow-x:auto\"><pre style=\"margin:0;white-space:pre-wrap\"># Navigate to your project\ncd my-project\n\n# Start aider with Claude (best coding performance)\naider --model claude-sonnet-4-6\n\n# Or start with the default model\naider\n\n# Aider opens an interactive chat. Try:\n# \"Add a health check endpoint to app.ts\"\n# \"Fix the type error in utils.ts line 42\"\n# \"Write unit tests for the UserService class\"</pre></div>\n\n<h2>Key Commands</h2>\n<table style=\"width:100%;border-collapse:collapse;margin:1rem 0\">\n<thead><tr style=\"border-bottom:2px solid #e8e8ed\"><th style=\"text-align:left;padding:0.75rem 0.5rem;font-weight:600\">Command</th><th style=\"text-align:left;padding:0.75rem 0.5rem;font-weight:600\">What it does</th></tr></thead>\n<tbody>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem;font-family:JetBrains Mono,monospace;font-size:0.85rem\">/add file.ts</td><td style=\"padding:0.75rem 0.5rem\">Add a file to the chat context</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem;font-family:JetBrains Mono,monospace;font-size:0.85rem\">/drop file.ts</td><td style=\"padding:0.75rem 0.5rem\">Remove a file from context</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem;font-family:JetBrains Mono,monospace;font-size:0.85rem\">/commit</td><td style=\"padding:0.75rem 0.5rem\">Commit pending changes</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem;font-family:JetBrains Mono,monospace;font-size:0.85rem\">/undo</td><td style=\"padding:0.75rem 0.5rem\">Undo the last change</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem;font-family:JetBrains Mono,monospace;font-size:0.85rem\">/diff</td><td style=\"padding:0.75rem 0.5rem\">Show pending diffs</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem;font-family:JetBrains Mono,monospace;font-size:0.85rem\">/clear</td><td style=\"padding:0.75rem 0.5rem\">Clear the chat history</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem;font-family:JetBrains Mono,monospace;font-size:0.85rem\">/map</td><td style=\"padding:0.75rem 0.5rem\">Show a map of the codebase</td></tr>\n<tr><td style=\"padding:0.75rem 0.5rem;font-family:JetBrains Mono,monospace;font-size:0.85rem\">/model name</td><td style=\"padding:0.75rem 0.5rem\">Switch to a different model</td></tr>\n</tbody></table>\n\n<h2>Multi-File Editing</h2>\n<p>One of Aider's best features is editing multiple files at once. Just describe what you want across files:</p>\n<div style=\"background:#1d1d1f;color:#30d158;border-radius:12px;padding:1rem 1.25rem;font-family:JetBrains Mono,monospace;font-size:0.9rem;margin:1rem 0;overflow-x:auto\"><pre style=\"margin:0;white-space:pre-wrap\"># Add auth middleware to Express app — 3 files edited\n\"Add JWT authentication middleware to the Express app.\nCreate a middleware/auth.ts file, update app.ts to use it,\nand add the jsonwebtoken dependency to package.json.\"</pre></div>\n\n<h2>Aider vs Claude Code vs Cursor</h2>\n<table style=\"width:100%;border-collapse:collapse;margin:1rem 0\">\n<thead><tr style=\"border-bottom:2px solid #e8e8ed\"><th style=\"text-align:left;padding:0.75rem 0.5rem;font-weight:600\">Feature</th><th style=\"text-align:center;padding:0.75rem 0.5rem;font-weight:600\">Aider</th><th style=\"text-align:center;padding:0.75rem 0.5rem;font-weight:600\">Claude Code</th><th style=\"text-align:center;padding:0.75rem 0.5rem;font-weight:600\">Cursor</th></tr></thead>\n<tbody>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem\">Interface</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">Terminal</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">Terminal</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">IDE (VS Code)</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem\">Multi-file editing</td><td style=\"text-align:center;padding:0.75rem 0.5rem;color:#30d158\">Yes</td><td style=\"text-align:center;padding:0.75rem 0.5rem;color:#30d158\">Yes</td><td style=\"text-align:center;padding:0.75rem 0.5rem;color:#30d158\">Yes</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem\">Git integration</td><td style=\"text-align:center;padding:0.75rem 0.5rem;color:#30d158\">Auto commit</td><td style=\"text-align:center;padding:0.75rem 0.5rem;color:#30d158\">Auto commit</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">Manual</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem\">Model choices</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">Any LLM</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">Claude only</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">Multiple</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem\">Pricing</td><td style=\"text-align:center;padding:0.75rem 0.5rem;color:#30d158\">Free (OSS)</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">Free (API costs)</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">$20/mo</td></tr>\n<tr style=\"border-bottom:1px solid #f5f5f7\"><td style=\"padding:0.75rem 0.5rem\">Repo map</td><td style=\"text-align:center;padding:0.75rem 0.5rem;color:#30d158\">Yes</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">Yes</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">Indexing</td></tr>\n<tr><td style=\"padding:0.75rem 0.5rem\">Open source</td><td style=\"text-align:center;padding:0.75rem 0.5rem;color:#30d158\">Yes (Apache 2.0)</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">No</td><td style=\"text-align:center;padding:0.75rem 0.5rem\">No</td></tr>\n</tbody></table>\n\n<h2>When to Use Aider</h2>\n<ul style=\"margin:1rem 0;padding-left:1.5rem\">\n<li style=\"margin-bottom:0.5rem\"><strong>Terminal-native developers</strong> who prefer CLI over IDE</li>\n<li style=\"margin-bottom:0.5rem\"><strong>Multi-model flexibility</strong> — switch between Claude, GPT, Gemini, or OpenRouter</li>\n<li style=\"margin-bottom:0.5rem\"><strong>Open source projects</strong> where auto-Git commits and Apache 2.0 license matter</li>\n<li style=\"margin-bottom:0.5rem\"><strong>Bulk refactoring</strong> — edit 10+ files in one prompt</li>\n<li style=\"margin-bottom:0.5rem\"><strong>Cost-conscious teams</strong> — free tool, only pay for API usage</li>\n</ul>\n\n<h2>Pro Tips</h2>\n<ol style=\"margin:1rem 0;padding-left:1.5rem\">\n<li style=\"margin-bottom:0.75rem\"><strong>Use Claude for complex tasks.</strong> Aider's SWE-bench scores are highest with Claude Opus for architecture work and Claude Sonnet for speed.</li>\n<li style=\"margin-bottom:0.75rem\"><strong>Add relevant files first.</strong> Use <code>/add</code> to give Aider context before asking for changes. The repo <code>/map</code> helps Aider understand structure but doesn't replace reading key files.</li>\n<li style=\"margin-bottom:0.75rem\"><strong>Write clear prompts.</strong> Aider works best with specific instructions: \"Add input validation to the POST /users endpoint checking for required email and name fields\" beats \"add validation.\"</li>\n<li style=\"margin-bottom:0.75rem\"><strong>Use <code>/undo</code> liberally.</strong> Every change is reversible. Experiment freely.</li>\n<li style=\"margin-bottom:0.75rem\"><strong>Git is your safety net.</strong> Aider auto-commits every change, so you can always <code>git reset</code> back.</li>\n</ol>\n\n<p style=\"margin-top:1.5rem;padding:1rem;background:#f0f7ff;border-radius:12px;font-size:0.95rem\"><strong>Get started:</strong> <a href=\"https://github.com/paul-gauthier/aider\" style=\"color:#0071E3\">Aider on GitHub</a> — 25K+ stars, Apache 2.0 license, 200+ contributors. Works on macOS, Linux, and Windows (WSL).</p>","faq":[{"q":"Is Aider better than Claude Code?","a":"They solve different problems. Aider is model-agnostic, open source, and works with any LLM provider. Claude Code has deeper Claude integration with tool use, MCP servers, and the full Claude Code harness. For pure pair programming, Aider is lighter. For complex multi-step agent workflows, Claude Code is more capable."},{"q":"Does Aider work with local models like Ollama?","a":"Yes, Aider supports Ollama, LM Studio, and any OpenAI-compatible endpoint. Use <code>aider --model ollama/llama3.3</code> or <code>aider --model openai-compatible/deepseek --openai-api-base http://localhost:1234/v1</code>. Performance varies by model size — larger models (70B+) work better for complex coding tasks."},{"q":"How much does Aider cost?","a":"Aider itself is free and open source (Apache 2.0). You only pay for LLM API usage. With Claude Sonnet, expect $5-15/month for casual use or $50-200/month for heavy daily coding. You can reduce costs by using cheaper models for simple tasks."},{"q":"Can Aider see my entire codebase?","a":"Aider uses a repo map to understand your project structure, but it only reads files you explicitly <code>/add</code> to the chat. Your code stays on your machine — Aider sends prompts and file contents to your chosen LLM provider's API. No code is sent to Aider's servers."},{"q":"What languages does Aider support?","a":"Aider works with any programming language since it reads and writes files as text. It has been benchmark-tested on Python, JavaScript, TypeScript, Go, Rust, Java, C++, PHP, Ruby, and more. Multi-language projects are supported natively."}],"keywords":["aider tutorial","aider ai coding","aider getting started","aider vs claude code","aider vs cursor","ai pair programming","aider setup guide 2026","aider CLI tutorial"],"canonical":"https://aicalc.cloud/aider-tutorial/","ogType":"article"}</script>
