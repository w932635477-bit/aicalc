ht syntax differences — use our dialect switcher above to get the exact expression."},{"q":"Can I combine step and range in the same field?","a":"Not directly in standard cron. */N applies to the full range (0-59 for minutes, 0-23 for hours). For \"every 10 minutes from 9:15 to 5:45,\" use 15-45/10 9-17 * * * — this combines a starting range with a step. Standard cron supports this in some implementations but not all."},{"q":"What are common mistakes when using */30 8-17 * * *?","a":"Common pitfalls: (1) Cron uses a minimal PATH — always use full paths to commands and scripts. (2) Percent signs (%) must be escaped with backslash in crontab. (3) Cron runs in the system timezone — set CRON_TZ=UTC at the top of your crontab for consistent UTC scheduling. (4) Redirect output to prevent email spam: */30 8-17 * * * /path/command >> /var/log/myjob.log 2>&1. (5) Test your cron expression with crontab.guru or our validator above before deploying."}],"keywords":["cron every 30 min work hours","*/30 8-17 * * *"]}</script>
