        {"@type":"Question","name":"什么是 Cron 表达式？","acceptedAnswer":{"@type":"Answer","text":"Cron 表达式是由5个空格分隔的字段组成的字符串，用于定义定时任务的执行时间：分钟(0-59)、小时(0-23)、日期(1-31)、月份(1-12)、星期(0-6, 0=周日)。例如 0 9 * * 1-5 表示"每周一到周五上午9点执行"。"}},
        {"@type":"Question","name":"如何使用 Cron 表达式生成器？","acceptedAnswer":{"@type":"Answer","text":"输入自然语言描述（如"每5分钟"、"每周一早上9点"）或选择预设模板。生成器会显示对应的 Cron 表达式、中文解释、以及未来5次执行时间。你还可以切换不同的语法方言：Unix/Linux、Quartz(Java/Spring)和 AWS EventBridge。"}},
        {"@type":"Question","name":"* * * * * 在 Cron 中是什么意思？","acceptedAnswer":{"@type":"Answer","text":"* * * * * 表示"每分钟执行一次"。每个星号都是通配符：第1个覆盖所有分钟(0-59)，第2个覆盖所有小时(0-23)，第3个覆盖所有日期，第4个覆盖所有月份，第5个覆盖所有星期。相当于每60秒运行一次你的脚本。"}},
        {"@type":"Question","name":"如何用 Cron 每小时执行一次任务？","acceptedAnswer":{"@type":"Answer","text":"使用 0 * * * * 在每小时的第0分钟执行（如 00:00, 01:00, 02:00...）。如果要在每小时的30分执行，用 30 * * * *。在 Quartz 中用 0 0 * * * ?，在 AWS EventBridge 中用 cron(0 * * * ? *)。"}},
        {"@type":"Question","name":"Unix Crontab、Quartz 和 AWS EventBridge 的 Cron 有什么区别？","acceptedAnswer":{"@type":"Answer","text":"Unix/Linux 使用标准5字段格式。Quartz(Java/Spring)增加了秒字段在开头（共7个字段），并用 ? 代替 * 处理日期和星期冲突。AWS EventBridge 使用6字段（增加年份），需要用 cron(...) 包裹表达式，并用 ? 表示不指定的字段。本工具支持一键切换三种语法。"}}
