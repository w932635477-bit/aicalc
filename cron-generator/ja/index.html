        {"@type":"Question","name":"Cron式とは何ですか？","acceptedAnswer":{"@type":"Answer","text":"Cron式は、5つのスペース区切りフィールドで構成される文字列で、ジョブの実行タイミングを定義します：分(0-59)、時(0-23)、日(1-31)、月(1-12)、曜日(0-6, 0=日曜)。例えば 0 9 * * 1-5 は「平日の午前9時に実行」を意味します。"}},
        {"@type":"Question","name":"Cron式ジェネレーターの使い方は？","acceptedAnswer":{"@type":"Answer","text":"自然言語で「5分ごと」「毎週月曜の午前9時」のように入力するか、プリセットテンプレートを選択します。ジェネレーターが対応するCron式、日本語での説明、次回5回の実行時刻を表示します。Unix/Linux、Quartz(Java/Spring)、AWS EventBridgeの3つのシンタックス方言を切り替えることもできます。"}},
        {"@type":"Question","name":"* * * * * はCronで何を意味しますか？","acceptedAnswer":{"@type":"Answer","text":"* * * * * は「毎分実行」を意味します。各アスタリスクはワイルドカードで、1番目はすべての分(0-59)、2番目はすべての時(0-23)、3番目はすべての日、4番目はすべての月、5番目はすべての曜日をカバーします。つまり60秒ごとにスクリプトが実行されます。"}},
        {"@type":"Question","name":"毎時ジョブをCronで実行するには？","acceptedAnswer":{"@type":"Answer","text":"0 * * * * を使用すると、毎時0分（00:00, 01:00, 02:00...）に実行されます。30分に実行する場合は 30 * * * * を使用します。Quartzでは 0 0 * * * ?、AWS EventBridgeでは cron(0 * * * ? *) となります。"}},
        {"@type":"Question","name":"Unix Crontab、Quartz、AWS EventBridgeのCronの違いは？","acceptedAnswer":{"@type":"Answer","text":"Unix/Linuxは標準5フィールド形式を使用。Quartz(Java/Spring)は先頭に秒フィールドを追加し（合計7フィールド）、日と曜日の競合時には * の代わりに ? を使用します。AWS EventBridgeは6フィールド（年を追加）を使用し、式を cron(...) でラップし、未指定フィールドには ? を使用します。本ツールはワンクリックで3つのシンタックスを切り替えられます。"}}
