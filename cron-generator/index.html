          "@type": "Question",
          "name": "What is a cron expression?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A cron expression is a string that defines a schedule for running tasks. Unix cron uses 5 fields: minute, hour, day of month, month, and day of week. For example, 0 9 * * 1-5 means every weekday at 9:00 AM."
          }
        },
        {
          "@type": "Question",
          "name": "How do I run a cron job every 5 minutes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Use */5 * * * * to run a command every 5 minutes. The */5 in the minute field means 'every 5th value'."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between Unix cron and Quartz cron?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Unix cron uses 5 fields (minute, hour, day, month, weekday). Quartz cron uses 6-7 fields, adding seconds and an optional year field. Quartz also uses ? instead of * for day-of-month and day-of-week fields when one is unspecified."
          }
        }
      ]
    }
