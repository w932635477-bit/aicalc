        {"@type":"Question","name":"¿Qué es una expresión cron?","acceptedAnswer":{"@type":"Answer","text":"Una expresión cron es una cadena de 5 campos que define cuándo se ejecuta una tarea programada: minuto (0-59), hora (0-23), día del mes (1-31), mes (1-12) y día de la semana (0-6, donde 0=Domingo). Por ejemplo, 0 9 * * 1-5 significa 'a las 9:00 AM de lunes a viernes'."}},
        {"@type":"Question","name":"¿Cómo usar el generador de expresiones cron?","acceptedAnswer":{"@type":"Answer","text":"Escribe tu horario en lenguaje natural (ej. 'cada 5 minutos', 'todos los lunes a las 9 AM') o selecciona una plantilla predefinida. El generador muestra la expresión cron, la explicación en español, y las próximas 5 ejecuciones. También puedes cambiar entre dialectos: Unix/Linux, Quartz (Java/Spring), y AWS EventBridge."}},
        {"@type":"Question","name":"¿Qué significa * * * * * en cron?","acceptedAnswer":{"@type":"Answer","text":"* * * * * significa 'cada minuto'. Cada asterisco es un comodín: el primero cubre todos los minutos (0-59), el segundo todas las horas (0-23), el tercero todos los días del mes, el cuarto todos los meses, y el quinto todos los días de la semana. En AWS EventBridge se usa cron(* * * * ? *) y en Quartz 0 * * * * ?."}},
        {"@type":"Question","name":"¿Cómo programar una tarea cada hora en cron?","acceptedAnswer":{"@type":"Answer","text":"Usa 0 * * * * para ejecutar una tarea al inicio de cada hora (00:00, 01:00, 02:00...). Si prefieres cada hora en el minuto 30, usa 30 * * * *. En Quartz usa 0 0 * * * ? y en AWS EventBridge cron(0 * * * ? *)."}},
        {"@type":"Question","name":"¿Qué diferencia hay entre cron de Unix, Quartz y AWS?","acceptedAnswer":{"@type":"Answer","text":"Unix/Linux usa 5 campos estándar. Quartz (Java/Spring) añade un campo de segundos al inicio (7 campos en total) y usa ? en lugar de * cuando hay conflicto entre día del mes y día de la semana. AWS EventBridge usa 6 campos (añade año) y requiere el formato cron(...) con ? para campos sin valor específico."}}
