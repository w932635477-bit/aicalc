      "mainEntity": [{"@type":"Question","name":"What does the cron expression 0 0 1 1 * mean?","acceptedAnswer":{"@type":"Answer","text":"The expression 0 0 1 1 * means: at minute 0, hour 0, day-of-month 1, month 1, day-of-week *. Each field in the cron expression controls a different time component: minute, hour, day of month, month, and day of week."}},{"@type":"Question","name":"How do I add 0 0 1 1 * to my crontab?","acceptedAnswer":{"@type":"Answer","text":"Run crontab -e in your terminal to open your crontab editor. Add a new line: 0 0 1 1 * /path/to/your/script.sh. Save and exit. Verify with crontab -l. Make sure your script is executable (chmod +x script.sh) and uses full paths for all commands."}},{"@type":"Question","name":"What is the equivalent of 0 0 1 1 * on Quartz / AWS / Kubernetes?","acceptedAnswer":{"@type":"Answer","text":"Quartz Scheduler: 0 0 1 1 *. AWS EventBridge: cron(0 0 1 1 ? *). Kubernetes CronJob: schedule: \"0 0 1 1 *\" (standard 5-field format). Each platform has slight syntax differences — use our dialect switcher above to get the exact expression."}},{"@type":"Question","name":"How do I run on a specific date that isn't the 1st?","acceptedAnswer":{"@type":"Answer","text":"Change the day-of-month field. For example, 0 0 15 1 * runs on the 15th instead of the 1. For \"last Friday of March,\" you need script-side date logic — cron cannot express this natively."}},{"@type":"Question","name":"What are common mistakes when using 0 0 1 1 *?","acceptedAnswer":{"@type":"Answer","text":"Common pitfalls: (1) Cron uses a minimal PATH — always use full paths to commands and scripts. (2) Percent signs (%) must be escaped with backslash in crontab. (3) Cron runs in the system timezone — set CRON_TZ=UTC at the top of your crontab for consistent UTC scheduling. (4) Redirect output to prevent email spam: 0 0 1 1 * /path/command >> /var/log/myjob.log 2>&1. (5) Test your cron expression with crontab.guru or our validator above before deploying."}}]

ld format). Each platform has slight syntax differences — use our dialect switcher above to get the exact expression."},{"q":"How do I run on a specific date that isn't the 1st?","a":"Change the day-of-month field. For example, 0 0 15 1 * runs on the 15th instead of the 1. For \"last Friday of March,\" you need script-side date logic — cron cannot express this natively."},{"q":"What are common mistakes when using 0 0 1 1 *?","a":"Common pitfalls: (1) Cron uses a minimal PATH — always use full paths to commands and scripts. (2) Percent signs (%) must be escaped with backslash in crontab. (3) Cron runs in the system timezone — set CRON_TZ=UTC at the top of your crontab for consistent UTC scheduling. (4) Redirect output to prevent email spam: 0 0 1 1 * /path/command >> /var/log/myjob.log 2>&1. (5) Test your cron expression with crontab.guru or our validator above before deploying."}],"keywords":["cron every year","annual cron","yearly cron"],"codeExamples":[{"label":"Basic crontab entry","code":"0 0 1 1 * /path/to/your/script.sh"},{"label":"With output logging","code":"0 0 1 1 * /path/to/script.sh >> /var/log/cronjob.log 2>&1"},{"label":"Kubernetes CronJob (YAML)","code":"apiVersion: batch/v1\nkind: CronJob\nmetadata:\n  name: monthly-task\nspec:\n  schedule: \"0 0 1 1 *\"\n  jobTemplate:\n    spec:\n      template:\n        spec:\n          containers:\n          - name: task\n            image: my-image:latest"}],"relatedPages":[{"label":"Every Hour","cron":"0 * * * *","url":"/cron-generator/every-hour/"},{"label":"Every Day at Midnight","cron":"0 0 * * *","url":"/cron-generator/every-day-midnight/"},{"label":"Weekdays at 9 AM","cron":"0 9 * * 1-5","url":"/cron-generator/weekdays-9am/"},{"label":"First of Month","cron":"0 0 1 * *","url":"/cron-generator/first-of-month/"}]}</script>
