    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I set up a cron job on Vercel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Add a \"crons\" array to your vercel.json. Each entry needs a \"path\" (your API route) and a \"schedule\" (standard 5-field cron expression). Deploy and Vercel handles the rest."
          }
        },
        {
          "@type": "Question",
          "name": "What is the cron syntax for vercel.json?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vercel uses standard Unix 5-field cron: minute hour day-of-month month day-of-week. For example, \"0 */6 * * *\" runs every 6 hours."
          }
        },
        {
          "@type": "Question",
          "name": "Does Vercel support 6-field cron expressions with seconds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Vercel cron uses the standard 5-field Unix cron format. The minimum interval is 1 minute. You cannot specify seconds."
          }
        },
        {
          "@type": "Question",
          "name": "What are Vercel cron job limits?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hobby (free): 1 cron job, 60s timeout. Pro: 2 cron jobs, 300s timeout. Enterprise: unlimited cron jobs, configurable timeout. All plans: minimum 1-minute interval, UTC timezone only."
          }
        },
        {
          "@type": "Question",
          "name": "How do I debug a Vercel cron job?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Use vercel logs --follow to stream real-time logs, or check the Functions tab in the Vercel dashboard. Look for the cron trigger in log entries."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Vercel cron jobs on the free plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Hobby (free) plan supports 1 cron job with a 60-second function timeout. For multiple cron jobs or longer timeouts, upgrade to Pro."
          }
        }
      ]
    }
    </script>
