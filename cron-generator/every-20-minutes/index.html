      "mainEntity": [{"@type":"Question","name":"What does the cron expression */20 * * * * mean?","acceptedAnswer":{"@type":"Answer","text":"The expression */20 * * * * means: at minute */20, hour *, day-of-month *, month *, day-of-week *. Each field in the cron expression controls a different time component: minute, hour, day of month, month, and day of week."}},{"@type":"Question","name":"How do I add */20 * * * * to my crontab?","acceptedAnswer":{"@type":"Answer","text":"Run crontab -e in your terminal to open your crontab editor. Add a new line: */20 * * * * /path/to/your/script.sh. Save and exit. Verify with crontab -l. Make sure your script is executable (chmod +x script.sh) and uses full paths for all commands."}},{"@type":"Question","name":"What is the equivalent of */20 * * * * on Quartz / AWS / Kubernetes?","acceptedAnswer":{"@type":"Answer","text":"Quartz Scheduler: */20 * * * ?. AWS EventBridge: cron(*/20 * ? * * *). Kubernetes CronJob: schedule: \"*/20 * * * *\" (standard 5-field format). Each platform has slight syntax differences — use our dialect switcher above to get the exact expression."}},{"@type":"Question","name":"Is running a cron every 20 minutes too frequent?","acceptedAnswer":{"@type":"Answer","text":"It depends on your task. For monitoring and health checks, every 20 minutes is standard. For data processing, consider whether the data changes fast enough to warrant this frequency. Key rule: each execution must complete within 20 minutes to avoid overlap. Use flock or a similar lock mechanism for safety."}},{"@type":"Question","name":"What are common mistakes when using */20 * * * *?","acceptedAnswer":{"@type":"Answer","text":"Common pitfalls: (1) Cron uses a minimal PATH — always use full paths to commands and scripts. (2) Percent signs (%) must be escaped with backslash in crontab. (3) Cron runs in the system timezone — set CRON_TZ=UTC at the top of your crontab for consistent UTC scheduling. (4) Redirect output to prevent email spam: */20 * * * * /path/command >> /var/log/myjob.log 2>&1. (5) Test your cron expression with crontab.guru or our validator above before deploying."}},{"@type":"Question","name":"Are there alternative cron expressions for this schedule?","acceptedAnswer":{"@type":"Answer","text":"For more frequent checks, try */5 * * * * (every 5 minutes). To restrict to business hours: */20 9-17 * * 1-5."}}]
