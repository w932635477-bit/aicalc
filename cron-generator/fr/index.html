      "mainEntity": [
        {"@type":"Question","name":"Qu'est-ce qu'une expression cron ?","acceptedAnswer":{"@type":"Answer","text":"Une expression cron est une chaîne de 5 champs séparés par des espaces qui définit quand une tâche planifiée s'exécute : minute (0-59), heure (0-23), jour du mois (1-31), mois (1-12), jour de la semaine (0-6, 0=Dimanche). Par exemple, 0 9 * * 1-5 signifie « à 9h00 du lundi au vendredi »."}},
        {"@type":"Question","name":"Comment utiliser le générateur d'expressions cron ?","acceptedAnswer":{"@type":"Answer","text":"Saisissez votre planning en langage naturel (ex. « toutes les 5 minutes », « tous les lundis à 9h ») ou choisissez un modèle prédéfini. Le générateur affiche l'expression cron correspondante, une explication en français et les 5 prochaines exécutions. Vous pouvez également basculer entre les dialectes : Unix/Linux, Quartz (Java/Spring) et AWS EventBridge."}},
        {"@type":"Question","name":"Que signifie * * * * * dans cron ?","acceptedAnswer":{"@type":"Answer","text":"* * * * * signifie « chaque minute ». Chaque astérisque est un joker : le premier couvre toutes les minutes (0-59), le deuxième toutes les heures (0-23), le troisième tous les jours du mois, le quatrième tous les mois, et le cinquième tous les jours de la semaine. Votre script s'exécute toutes les 60 secondes."}},
        {"@type":"Question","name":"Comment exécuter une tâche cron chaque heure ?","acceptedAnswer":{"@type":"Answer","text":"Utilisez 0 * * * * pour exécuter au début de chaque heure (00:00, 01:00, 02:00...). Pour exécuter à la 30e minute, utilisez 30 * * * *. Dans Quartz : 0 0 * * * ? et dans AWS EventBridge : cron(0 * * * ? *)."}},
        {"@type":"Question","name":"Quelle différence entre cron Unix, Quartz et AWS EventBridge ?","acceptedAnswer":{"@type":"Answer","text":"Unix/Linux utilise le format standard à 5 champs. Quartz (Java/Spring) ajoute un champ de secondes au début (7 champs au total) et utilise ? au lieu de * en cas de conflit jour du mois/jour de la semaine. AWS EventBridge utilise 6 champs (ajoute l'année), exige le format cron(...) et utilise ? pour les champs sans valeur spécifique. Cet outil permet de basculer entre les trois syntaxes en un clic."}}
      ]
