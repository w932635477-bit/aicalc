        {"@type":"Question","name":"Cron 표현식이란 무엇인가요?","acceptedAnswer":{"@type":"Answer","text":"Cron 표현식은 공백으로 구분된 5개의 필드로 구성된 문자열로, 예약된 작업의 실행 시점을 정의합니다: 분(0-59), 시(0-23), 일(1-31), 월(1-12), 요일(0-6, 0=일요일). 예를 들어 0 9 * * 1-5는 '월요일부터 금요일까지 오전 9시에 실행'을 의미합니다."}},
        {"@type":"Question","name":"Cron 표현식 생성기는 어떻게 사용하나요?","acceptedAnswer":{"@type":"Answer","text":"자연어로 일정을 입력하거나(예: '5분마다', '매주 월요일 오전 9시') 사전 정의된 템플릿을 선택하세요. 생성기가 해당 Cron 표현식, 한국어 설명, 다음 5회 실행 시간을 표시합니다. Unix/Linux, Quartz(Java/Spring), AWS EventBridge 세 가지 구문 간 전환도 가능합니다."}},
        {"@type":"Question","name":"* * * * * 는 Cron에서 무엇을 의미하나요?","acceptedAnswer":{"@type":"Answer","text":"* * * * * 는 '매 분마다 실행'을 의미합니다. 각 별표는 와일드카드로, 첫 번째는 모든 분(0-59), 두 번째는 모든 시(0-23), 세 번째는 모든 일, 네 번째는 모든 월, 다섯 번째는 모든 요일을 포함합니다. 즉 60초마다 스크립트가 실행됩니다."}},
        {"@type":"Question","name":"매시간 Cron 작업을 실행하려면 어떻게 하나요?","acceptedAnswer":{"@type":"Answer","text":"0 * * * * 를 사용하여 매시간 0분(00:00, 01:00, 02:00...)에 실행합니다. 30분에 실행하려면 30 * * * * 를 사용하세요. Quartz에서는 0 0 * * * ?, AWS EventBridge에서는 cron(0 * * * ? *) 를 사용합니다."}},
        {"@type":"Question","name":"Unix Crontab, Quartz, AWS EventBridge의 Cron 차이점은 무엇인가요?","acceptedAnswer":{"@type":"Answer","text":"Unix/Linux는 표준 5필드 형식을 사용합니다. Quartz(Java/Spring)는 앞에 초 필드를 추가하고(총 7필드), 일과 요일 충돌 시 * 대신 ?를 사용합니다. AWS EventBridge는 6필드(연도 추가)를 사용하며 cron(...) 형식으로 감싸고, 지정되지 않은 필드는 ?를 사용합니다. 이 도구는 클릭 한 번으로 세 가지 구문을 전환할 수 있습니다."}}
