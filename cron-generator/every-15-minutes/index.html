      "mainEntity": [{"@type":"Question","name":"What does the cron expression */15 * * * * mean?","acceptedAnswer":{"@type":"Answer","text":"The expression */15 * * * * means: at minute */15, hour *, day-of-month *, month *, day-of-week *. Each field in the cron expression controls a different time component: minute, hour, day of month, month, and day of week."}},{"@type":"Question","name":"How do I add */15 * * * * to my crontab?","acceptedAnswer":{"@type":"Answer","text":"Run crontab -e in your terminal to open your crontab editor. Add a new line: */15 * * * * /path/to/your/script.sh. Save and exit. Verify with crontab -l. Make sure your script is executable (chmod +x script.sh) and uses full paths for all commands."}},{"@type":"Question","name":"What is the equivalent of */15 * * * * on Quartz / AWS / Kubernetes?","acceptedAnswer":{"@type":"Answer","text":"Quartz Scheduler: */15 * * * ?. AWS EventBridge: cron(*/15 * ? * * *). Kubernetes CronJob: schedule: \"*/15 * * * *\" (standard 5-field format). Each platform has slight syntax differences — use our dialect switcher above to get the exact expression."}},{"@type":"Question","name":"Is running a cron every 15 minutes too frequent?","acceptedAnswer":{"@type":"Answer","text":"It depends on your task. For monitoring and health checks, every 15 minutes is standard. For data processing, consider whether the data changes fast enough to warrant this frequency. Key rule: each execution must complete within 15 minutes to avoid overlap. Use flock or a similar lock mechanism for safety."}},{"@type":"Question","name":"What are common mistakes when using */15 * * * *?","acceptedAnswer":{"@type":"Answer","text":"Common pitfalls: (1) Cron uses a minimal PATH — always use full paths to commands and scripts. (2) Percent signs (%) must be escaped with backslash in crontab. (3) Cron runs in the system timezone — set CRON_TZ=UTC at the top of your crontab for consistent UTC scheduling. (4) Redirect output to prevent email spam: */15 * * * * /path/command >> /var/log/myjob.log 2>&1. (5) Test your cron expression with crontab.guru or our validator above before deploying."}},{"@type":"Question","name":"Are there alternative cron expressions for this schedule?","acceptedAnswer":{"@type":"Answer","text":"For more frequent checks, try */5 * * * * (every 5 minutes). To restrict to business hours: */15 9-17 * * 1-5."}}]

    <script type="application/json" id="seo-data">{"slug":"every-15-minutes","cron":"*/15 * * * *","title":"Cron Every 15 Minutes - Schedule & Syntax","h1":"Cron Every 15 Minutes","description":"Set up a cron job every 15 minutes with */15 * * * *. Works with Unix, Quartz, and AWS EventBridge.","explanation":"The cron expression */15 * * * * uses the step operator (*/15) in the minute field to run a command every 15 minutes. It triggers at minute 0, 15, 30, 45 of every hour, producing 96 executions per day. This schedule is ideal for tasks that need frequent but not continuous execution: API health checks, data synchronization between systems, queue polling, cache warming, or metrics collection. The step operator */15 means \"every 15th value starting from 0,\" which is why it fires at minute 0 (the top of the hour) as the first trigger. For Quartz Scheduler, use 0 */15 * ? * * (add seconds field at the start, and ? for day-of-week). For AWS EventBridge, use rate(15 minutes) or cron(0/15 * ? * * *). For Kubernetes CronJob, the standard 5-field format works: schedule: \"*/15 * * * *\". On Vercel Cron, add to vercel.json: { \"crons\": [{ \"path\": \"/api/task\", \"schedule\": \"*/15 * * * *\" }] }. A common mistake is confusing */15 with 0-59/15. They are equivalent — both trigger at the same times. Another pitfall: if your job takes longer than 15 minutes, executions will overlap. Use a lock file (flock) or a queue system to prevent concurrent runs. If you need this schedule only during business hours, combine it with an hour range: */15 9-17 * * 1-5 runs every 15 minutes from 9 AM to 5 PM on weekdays only.","faq":[{"q":"What does the cron expression */15 * * * * mean?","a":"The expression */15 * * * * means: at minute */15, hour *, day-of-month *, month *, day-of-week *. Each field in the cron expression controls a different time component: minute, hour, day of month, month, and day of week."},{"q":"How do I add */15 * * * * to my crontab?","a":"Run crontab -e in your terminal to open your crontab editor. Add a new line: */15 * * * * /path/to/your/script.sh. Save and exit. Verify with crontab -l. Make sure your script is executable (chmod +x script.sh) and uses full paths for all commands."},{"q":"What is the equivalent of */15 * * * * on Quartz / AWS / Kubernetes?","a":"Quartz Scheduler: */15 * * * ?. AWS EventBridge: cron(*/15 * ? * * *). Kubernetes CronJob: schedule: \"*/15 * * * *\" (standard 5-field format). Each platform has slight syntax differences — use our dialect switcher above to get the exact expression."},{"q":"Is running a cron every 15 minutes too frequent?","a":"It depends on your task. For monitoring and health checks, every 15 minutes is standard. For data processing, consider whether the data changes fast enough to warrant this frequency. Key rule: each execution must complete within 15 minutes to avoid overlap. Use flock or a similar lock mechanism for safety."},{"q":"What are common mistakes when using */15 * * * *?","a":"Common pitfalls: (1) Cron uses a minimal PATH — always use full paths to commands and scripts. (2) Percent signs (%) must be escaped with backslash in crontab. (3) Cron runs in the system timezone — set CRON_TZ=UTC at the top of your crontab for consistent UTC scheduling. (4) Redirect output to prevent email spam: */15 * * * * /path/command >> /var/log/myjob.log 2>&1. (5) Test your cron expression with crontab.guru or our validator above before deploying."},{"q":"Are there alternative cron expressions for this schedule?","a":"For more frequent checks, try */5 * * * * (every 5 minutes). To restrict to business hours: */15 9-17 * * 1-5."}],"keywords":["cron every 15 minutes","*/15 * * * *"]}</script>
