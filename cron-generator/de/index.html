        {"@type":"Question","name":"Was ist ein Cron-Ausdruck?","acceptedAnswer":{"@type":"Answer","text":"Ein Cron-Ausdruck ist eine Zeichenkette aus 5 durch Leerzeichen getrennten Feldern, die definiert, wann eine geplante Aufgabe ausgeführt wird: Minute (0-59), Stunde (0-23), Tag des Monats (1-31), Monat (1-12), Wochentag (0-6, 0=Sonntag). Zum Beispiel bedeutet 0 9 * * 1-5 „um 9:00 Uhr von Montag bis Freitag\"."}},
        {"@type":"Question","name":"Wie benutzt man den Cron-Ausdruck-Generator?","acceptedAnswer":{"@type":"Answer","text":"Geben Sie Ihren Zeitplan in natürlicher Sprache ein (z.B. „alle 5 Minuten\", „jeden Montag um 9 Uhr\") oder wählen Sie eine Vorlage. Der Generator zeigt den entsprechenden Cron-Ausdruck, eine deutsche Erklärung und die nächsten 5 Ausführungszeiten an. Sie können auch zwischen den Dialekten wechseln: Unix/Linux, Quartz (Java/Spring) und AWS EventBridge."}},
        {"@type":"Question","name":"Was bedeutet * * * * * in Cron?","acceptedAnswer":{"@type":"Answer","text":"* * * * * bedeutet „jede Minute\". Jeder Stern ist ein Platzhalter: der erste deckt alle Minuten (0-59) ab, der zweite alle Stunden (0-23), der dritte alle Tage des Monats, der vierte alle Monate und der fünfte alle Wochentage. Ihr Skript wird alle 60 Sekunden ausgeführt."}},
        {"@type":"Question","name":"Wie führe ich einen Cron-Job stündlich aus?","acceptedAnswer":{"@type":"Answer","text":"Verwenden Sie 0 * * * * für die Ausführung zu Beginn jeder Stunde (00:00, 01:00, 02:00...). Für die Ausführung zur 30. Minute verwenden Sie 30 * * * *. In Quartz: 0 0 * * * ? und in AWS EventBridge: cron(0 * * * ? *)."}},
        {"@type":"Question","name":"Was ist der Unterschied zwischen Unix Cron, Quartz und AWS EventBridge?","acceptedAnswer":{"@type":"Answer","text":"Unix/Linux verwendet das Standard-5-Felder-Format. Quartz (Java/Spring) fügt ein Sekundenfeld am Anfang hinzu (insgesamt 7 Felder) und verwendet ? statt * bei Konflikten zwischen Tag des Monats und Wochentag. AWS EventBridge verwendet 6 Felder (fügt Jahr hinzu), erfordert das Format cron(...) und verwendet ? für nicht angegebene Felder. Dieses Tool ermöglicht den Wechsel zwischen allen drei Syntaxen mit einem Klick."}}
      ]
