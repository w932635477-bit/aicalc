our validator above before deploying."}},{"@type":"Question","name":"Are there alternative cron expressions for this schedule?","acceptedAnswer":{"@type":"Answer","text":"For twice daily at the same time AM and PM: 0 2,14 * * *. For weekdays only: 0 2 * * 1-5."}}]
