        {"@type":"Question","name":"O que é uma expressão cron?","acceptedAnswer":{"@type":"Answer","text":"Uma expressão cron é uma string de 5 campos separados por espaços que define quando uma tarefa agendada é executada: minuto (0-59), hora (0-23), dia do mês (1-31), mês (1-12), dia da semana (0-6, 0=Domingo). Por exemplo, 0 9 * * 1-5 significa \"às 9h00 de segunda a sexta-feira\"."}},
        {"@type":"Question","name":"Como usar o gerador de expressões cron?","acceptedAnswer":{"@type":"Answer","text":"Digite seu agendamento em linguagem natural (ex.: \"a cada 5 minutos\", \"toda segunda às 9h\") ou selecione um modelo predefinido. O gerador mostra a expressão cron correspondente, uma explicação em português e as próximas 5 execuções. Você também pode alternar entre os dialetos: Unix/Linux, Quartz (Java/Spring) e AWS EventBridge."}},
        {"@type":"Question","name":"O que significa * * * * * no cron?","acceptedAnswer":{"@type":"Answer","text":"* * * * * significa \"a cada minuto\". Cada asterisco é um curinga: o primeiro cobre todos os minutos (0-59), o segundo todas as horas (0-23), o terceiro todos os dias do mês, o quarto todos os meses e o quinto todos os dias da semana. Seu script é executado a cada 60 segundos."}},
        {"@type":"Question","name":"Como executar uma tarefa cron a cada hora?","acceptedAnswer":{"@type":"Answer","text":"Use 0 * * * * para executar no início de cada hora (00:00, 01:00, 02:00...). Para executar no minuto 30, use 30 * * * *. No Quartz: 0 0 * * * ? e no AWS EventBridge: cron(0 * * * ? *)."}},
        {"@type":"Question","name":"Qual a diferença entre cron Unix, Quartz e AWS EventBridge?","acceptedAnswer":{"@type":"Answer","text":"Unix/Linux usa o formato padrão de 5 campos. O Quartz (Java/Spring) adiciona um campo de segundos no início (7 campos no total) e usa ? em vez de * quando há conflito entre dia do mês e dia da semana. O AWS EventBridge usa 6 campos (adiciona ano), exige o formato cron(...) e usa ? para campos não especificados. Esta ferramenta permite alternar entre as três sintaxes com um clique."}}
      ]
    }
