      "mainEntity": [{"@type":"Question","name":"What does the cron expression 0 9 * * 1 mean?","acceptedAnswer":{"@type":"Answer","text":"The expression 0 9 * * 1 means: at minute 0, hour 9, day-of-month *, month *, day-of-week 1. Each field in the cron expression controls a different time component: minute, hour, day of month, month, and day of week."}},{"@type":"Question","name":"How do I add 0 9 * * 1 to my crontab?","acceptedAnswer":{"@type":"Answer","text":"Run crontab -e in your terminal to open your crontab editor. Add a new line: 0 9 * * 1 /path/to/your/script.sh. Save and exit. Verify with crontab -l. Make sure your script is executable (chmod +x script.sh) and uses full paths for all commands."}},{"@type":"Question","name":"What is the equivalent of 0 9 * * 1 on Quartz / AWS / Kubernetes?","acceptedAnswer":{"@type":"Answer","text":"Quartz Scheduler: 0 9 * * 1. AWS EventBridge: cron(0 9 ? * 1 *). Kubernetes CronJob: schedule: \"0 9 * * 1\" (standard 5-field format). Each platform has slight syntax differences — use our dialect switcher above to get the exact expression."}},{"@type":"Question","name":"How do cron day-of-week numbers work?","acceptedAnswer":{"@type":"Answer","text":"Standard Unix cron uses 0-6: Sunday=0, Monday=1, Tuesday=2, Wednesday=3, Thursday=4, Friday=5, Saturday=6. Some implementations also accept 7 for Sunday. Quartz uses text labels: SUN, MON, TUE, WED, THU, FRI, SAT."}},{"@type":"Question","name":"What are common mistakes when using 0 9 * * 1?","acceptedAnswer":{"@type":"Answer","text":"Common pitfalls: (1) Cron uses a minimal PATH — always use full paths to commands and scripts. (2) Percent signs (%) must be escaped with backslash in crontab. (3) Cron runs in the system timezone — set CRON_TZ=UTC at the top of your crontab for consistent UTC scheduling. (4) Redirect output to prevent email spam: 0 9 * * 1 /path/command >> /var/log/myjob.log 2>&1. (5) Test your cron expression with crontab.guru or our validator above before deploying."}}]
