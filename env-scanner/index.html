        {"@type":"Question","name":"Why scan .env files?","acceptedAnswer":{"@type":"Answer","text":"Leaked API keys in .env files are the most common cause of cloud security incidents. A single committed .env file can expose your entire infrastructure. Scanning before commit catches mistakes early."}},
