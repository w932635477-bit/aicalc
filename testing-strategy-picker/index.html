    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {"@type":"Question","name":"How does this picker work?","acceptedAnswer":{"@type":"Answer","text":"It asks 5 questions about your project (type, team size, stage, risk priority, budget), then generates a personalized testing strategy with prioritized test layers and recommended tools."}},
        {"@type":"Question","name":"Are the recommended tools free?","acceptedAnswer":{"@type":"Answer","text":"Most are free and open-source (MIT, Apache-2.0). A few like Snyk and Chromatic have freemium models. Select Zero budget to filter for completely free tools."}},
        {"@type":"Question","name":"What is a testing pyramid?","acceptedAnswer":{"@type":"Answer","text":"A testing strategy organizes tests in layers: unit tests (many, fast) at the base, integration tests in the middle, and E2E tests (fewer, slower) at the top. Additional layers like performance, security, and accessibility tests are added based on your project needs."}},
        {"@type":"Question","name":"Should I implement all layers at once?","acceptedAnswer":{"@type":"Answer","text":"No. Start with critical layers for your stage. For an MVP, unit tests are often enough. Add layers as your project grows and your risk profile changes."}},
        {"@type":"Question","name":"How are priorities determined?","acceptedAnswer":{"@type":"Answer","text":"Priorities come from three factors: your project stage (MVP needs fewer layers), your risk priority (what scares you most gets boosted), and your project type (APIs need different tests than mobile apps)."}},
        {"@type":"Question","name":"Can I use this for a team project?","acceptedAnswer":{"@type":"Answer","text":"Yes. Select your team size and the recommendations adjust. Larger teams get more emphasis on integration tests, E2E tests, and CI/CD integration."}}
      ]
    }
